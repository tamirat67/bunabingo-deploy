services:
  # ─── 1. PostgreSQL Production Database ─────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: buna-db
    restart: always
    ports:
      - "127.0.0.1:5432:5432"   # ⚠️ INTERNAL ONLY — never expose Postgres publicly
    environment:
      POSTGRES_USER: bunabingo_user
      POSTGRES_PASSWORD: SecurePasswordHere123!
      POSTGRES_DB: bunabingo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bunabingo_user -d bunabingo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buna-network

  # ─── 2. Node.js Express API & Telegram Bot ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buna-backend
    restart: always
    ports:
      - "127.0.0.1:3001:3001"   # Nginx proxies :443 → localhost:3001
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads   # Persist receipt uploads & banners
      - ./backend/logs:/app/logs         # Persist debug logfiles
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - buna-network

  # ─── 3. Next.js Frontend Mini-App ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.bunatechhub.net}
    container_name: buna-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - buna-network

  # ─── 4. Telebirr Scraper Service ──────────────────────────────────────────
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: buna-scraper
    restart: always
    ports:
      - "127.0.0.1:3005:3000"   # ⚠️ INTERNAL ONLY — scraper must never be public
    environment:
      - BUNA_ENGINE_KEY=9f7a2d8e4c6b1a0f9e8d7c6b5a43210fe9
      - PORT=3000
    networks:
      - buna-network

  # ─── 5. Fast Keno Worker ──────────────────────────────────────────────────
  keno-worker:
    build:
      context: ./fast-keno
      dockerfile: Dockerfile
    container_name: buna-keno-worker
    restart: always
    ports:
      - "127.0.0.1:8090:8090"   # Internal HTTP API (ticket placement, admin — not public)
      - "127.0.0.1:8092:8091"   # WebSocket (real-time round updates to browser clients)
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Point to the shared Postgres database
      DATABASE_URL: "postgresql://bunabingo_user:SecurePasswordHere123!@db:5432/bunabingo?schema=public"
      DIRECT_URL: "postgresql://bunabingo_user:SecurePasswordHere123!@db:5432/bunabingo?schema=public"
      KENO_HTTP_PORT: "8090"
      KENO_WS_PORT: "8091"
      KENO_INTERNAL_SECRET: "buna-k3n0-s3cr3t-x9f2a7b4c1d8e5f6a3b0c9d2e7f4a1b8c"
      NODE_ENV: "production"
    networks:
      - buna-network


volumes:
  postgres_data:
    driver: local

networks:
  buna-network:
    driver: bridge
