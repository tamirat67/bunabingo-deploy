services:
  # ─── 1. PostgreSQL Production Database ─────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: buna-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bunabingo_user
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: bunabingo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bunabingo_user -d bunabingo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buna-network

  # ─── 2. Node.js Express API & Telegram Bot ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buna-backend
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "postgresql://bunabingo_user:admin123@db:5432/bunabingo?schema=public"
      DIRECT_URL: "postgresql://bunabingo_user:admin123@db:5432/bunabingo?schema=public"
    volumes:
      - ./backend/uploads:/app/uploads   # Persist receipt uploads & banners
      - ./backend/logs:/app/logs         # Persist debug logfiles
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - buna-network

  # ─── 3. Next.js Frontend Mini-App ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://bunatechhub.net/api}
    container_name: buna-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - buna-network

volumes:
  postgres_data:
    driver: local

networks:
  buna-network:
    driver: bridge
