version: '3.8'

services:
  backend:
    build: ./backend
    container_name: buna-backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    networks:
      - buna-network

  frontend:
    build: .
    container_name: buna-frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    networks:
      - buna-network

  scraper:
    build: ./scraper
    container_name: buna-scraper
    restart: always
    ports:
      - "3002:3000"
    env_file:
      - ./scraper/.env
    networks:
      - buna-network

networks:
  buna-network:
    driver: bridge
