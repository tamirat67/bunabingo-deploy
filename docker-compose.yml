services:
  # ─── 1. PostgreSQL Production Database ─────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: buna-db
    restart: always
    ports:
      - "127.0.0.1:5432:5432"   # ⚠️ INTERNAL ONLY — never expose Postgres publicly
    environment:
      POSTGRES_USER: bunabingo_user
      POSTGRES_PASSWORD: SecurePasswordHere123!
      POSTGRES_DB: bunabingo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bunabingo_user -d bunabingo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buna-network

  # ─── 2. Node.js Express API & Telegram Bot ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buna-backend
    restart: always
    ports:
      - "127.0.0.1:3001:3001"   # Nginx proxies :443 → localhost:3001
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads   # Persist receipt uploads & banners
      - ./backend/logs:/app/logs         # Persist debug logfiles
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - buna-network

  # ─── 3. Next.js Frontend Mini-App ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.bunatechhub.net}
    container_name: buna-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - buna-network

  # ─── 4. Telebirr Scraper Service ──────────────────────────────────────────
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: buna-scraper
    restart: always
    ports:
      - "127.0.0.1:3005:3000"   # ⚠️ INTERNAL ONLY — scraper must never be public
    environment:
      - BUNA_ENGINE_KEY=9f7a2d8e4c6b1a0f9e8d7c6b5a43210fe9
      - PORT=3000
    networks:
      - buna-network

  # ─── 5. Buna Wallet OTP Backend ─────────────────────────────────────────────
  wallet-backend:
    build:
      context: ./buna-wallet/server
      dockerfile: Dockerfile
    container_name: buna-wallet-backend
    restart: always
    ports:
      - "127.0.0.1:3002:3002"   # ⚠️ INTERNAL ONLY — Nginx proxies :443 → localhost:3002
    env_file:
      - ./buna-wallet/server/.env
    networks:
      - buna-network

volumes:
  postgres_data:
    driver: local

networks:
  buna-network:
    driver: bridge
